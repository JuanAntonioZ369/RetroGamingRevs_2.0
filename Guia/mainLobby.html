  <script>
    const { getNickName } = require('../status')
    const { ipcRenderer } = require('electron');

    document.getElementById('nickname').textContent = getNickName();

    let games = [];
    let currentView = 'list'; // 'grid' or 'list'

    // Receive games list
    ipcRenderer.on('games-list', (event, gamesList) => {
      games = gamesList;
      renderGames(games, currentView);
    });

    function renderGames(gamesToRender, view = 'grid') {
      const container = document.getElementById('games-grid');
      container.innerHTML = '';

      gamesToRender.forEach(game => {
        const card = document.createElement('div');
        if (view === 'list') {
          card.className = 'flex items-center gap-4 p-4 bg-slate-100 dark:bg-slate-800 rounded-lg';
          card.innerHTML = `
            <div class="flex-1">
              <h3 class="font-bold text-sm dark:text-white">${game.title}</h3>
            </div>
            <button onclick="playGame('${game.romPath}', '${game.title}')" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90">Play</button>
          `;
        } else {
          card.className = 'group game-card relative';
          card.innerHTML = `
            <div class="aspect-[4/5] rounded-xl overflow-hidden bg-slate-200 dark:bg-slate-800 shadow-xl border border-white/10 relative">
              <img class="w-full h-full object-cover" alt="${game.title}" src="${game.image}" />
              <div class="play-overlay absolute inset-0 bg-gradient-to-t from-primary/90 via-primary/40 to-transparent opacity-0 flex flex-col items-center justify-center p-6 transition-all duration-300">
                <button onclick="playGame('${game.romPath}', '${game.title}')" class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-primary shadow-2xl mb-4 hover:scale-110 transition-transform">
                  <span class="material-icons-round text-3xl">play_arrow</span>
                </button>
                <div class="text-center">
                  <div class="text-white font-bold text-lg leading-tight mb-1">${game.title}</div>
                </div>
              </div>
            </div>
            <div class="mt-4">
              <h3 class="font-bold text-sm truncate dark:text-white">${game.title}</h3>
            </div>
          `;
        }
        container.appendChild(card);
      });
    }

    function playGame(romPath, title) {
      window.location.href = 'gameModeSelection.html?game=' + encodeURIComponent(romPath) + '&title=' + encodeURIComponent(title);
    }

    // Search functionality
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const filtered = games.filter(game => game.title.toLowerCase().includes(query));
      renderGames(filtered, currentView);
    });

    // View toggle
    const gridBtn = document.getElementById('grid-btn');
    const listBtn = document.getElementById('list-btn');

    gridBtn.addEventListener('click', () => setView('grid'));
    listBtn.addEventListener('click', () => setView('list'));

    function setView(view) {
      currentView = view;
      const container = document.getElementById('games-grid');
      if (view === 'list') {
        container.className = 'flex flex-col gap-4'; // Simple list view
      } else {
        container.className = 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-8';
      }
      // Update button styles
      gridBtn.className = view === 'grid' ? 'p-1.5 rounded-md bg-white dark:bg-slate-700 shadow-sm text-primary' : 'p-1.5 rounded-md text-slate-400 hover:text-primary transition-colors';
      listBtn.className = view === 'list' ? 'p-1.5 rounded-md bg-white dark:bg-slate-700 shadow-sm text-primary' : 'p-1.5 rounded-md text-slate-400 hover:text-primary transition-colors';
      // Re-render with new view
      renderGames(games, currentView);
    }
  </script>
