<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />



  <title>GamingRevs - Mode Selection</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0d33f2",
            "background-light": "#f5f6f8",
            "background-dark": "#101322",
          },
          fontFamily: {
            "display": ["Spline Sans", "sans-serif"],
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px",
          },
        },
      },
    }
  </script>

  <style>
    .glass-panel {
      background: rgba(16, 19, 34, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .card-hover:hover {
      border-color: #0d33f2;
      transform: translateY(-4px);
      box-shadow: 0 0 30px rgba(13, 51, 242, 0.25);
    }
    .bg-vignette {
      background: radial-gradient(circle, rgba(16,19,34,0) 0%, rgba(16,19,34,0.95) 100%);
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen overflow-hidden">

  <!-- ===================== CINEMATIC BACKGROUND ===================== -->
  <div class="fixed inset-0 z-0">
    <img
      alt="A blurred cinematic screenshot of a retro 3D video game"
      class="w-full h-full object-cover blur-sm opacity-40 scale-105"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuArsu2dxHnJN0ci37JcLT3HcL_rJp1DIJQ1krkGa03hdlt7rh8Vyy2PQtPJza-ofaPJfk_VnSQh3rQ2nFBT-2rrASb3d908Lo1qvLdLmTkqW4z7AeAvZpMBV9-h-bYWFcaDiGsYkQw4AB51B3qS7iSYV4vv6OgC9UiNttal3nRkFhl5eiKkErvoA3zn-SxqqBfWAyaFtFqDjvc7Z_cSSEzvBMG6JxhytGRmt_7LiHyjD4fzVxna_DwDNF0tx8YdZnX5LG9GxBPGZPs"
    />
    <div class="absolute inset-0 bg-vignette"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-background-dark via-transparent to-background-dark/80"></div>
  </div>
  <!-- =================== END BACKGROUND =================== -->


  <!-- ===================== UI LAYER ===================== -->
  <div class="relative z-10 flex flex-col h-screen p-8 lg:p-12">

    <!-- ─── Header / Top Navigation ─── -->
    <header class="flex justify-between items-center mb-auto">

      <!-- Back button -->
      <button onclick="window.location.href='mainLobby.html'" class="flex items-center space-x-2 group text-white/70 hover:text-white transition-colors">
        <span class="material-icons text-2xl group-hover:-translate-x-1 transition-transform">arrow_back</span>
        <span class="text-sm font-medium tracking-widest uppercase">Back to Library</span>
      </button>

      <!-- Game title -->
      <div class="text-center">
        <h1 class="text-3xl lg:text-5xl font-bold tracking-tighter italic"> </h1>
        <div class="flex items-center justify-center space-x-4 mt-2 text-xs font-semibold tracking-widest text-white/50 uppercase">
          <span>1994</span>
          <span class="w-1 h-1 rounded-full bg-primary"></span>
          <span>PlayStation</span>
          <span class="w-1 h-1 rounded-full bg-primary"></span>
          <span>Action</span>
        </div>
      </div>

      <!-- Placeholder for removed network status -->

    </header>

    <!-- ─── Main Selection Area ─── -->
    <main class="flex-grow flex items-center justify-center max-w-7xl mx-auto w-full">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full">

        <!-- Card: Play Solo -->
        <div class="glass-panel group card-hover rounded-xl p-8 flex flex-col transition-all duration-300 cursor-pointer border-white/5">
          <div class="mb-8">
            <div class="w-16 h-16 rounded-xl bg-white/5 flex items-center justify-center mb-6 group-hover:bg-white/10 transition-colors">
              <span class="material-icons text-4xl text-white">person</span>
            </div>
            <h2 class="text-3xl font-bold mb-3">Play Solo</h2>
            <p class="text-white/60 leading-relaxed text-sm max-w-[280px]">
              Experience the cinematic masterpiece at your own pace. Original campaign with achievement tracking and save state support.
            </p>
          </div>
          <div class="mt-auto space-y-3">
            <button onclick="const r=jugar(carpeta,archivo);if(r&&!r.success&&r.error==='already_running')showToast('Ya hay un juego en ejecución. Ciérralo primero (Select+Start).');" class="w-full py-4 bg-white/10 hover:bg-white/20 rounded-lg font-bold text-sm tracking-widest uppercase flex items-center justify-center space-x-2 transition-all">
              <span class="material-icons text-lg">play_arrow</span>
              <span>Start New Game</span>
            </button>
          </div>
        </div>

        <!-- Card: Play Online -->
        <div class="glass-panel group card-hover rounded-xl p-8 flex flex-col transition-all duration-300 cursor-pointer border-white/5 relative overflow-hidden">

          <!-- Accent glow -->
          <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/20 blur-[80px] rounded-full"></div>

          <div class="mb-8 relative z-10">
            <div class="flex justify-between items-start">
              <div class="w-16 h-16 rounded-xl bg-primary flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(13,51,242,0.4)]">
                <span class="material-icons text-4xl text-white">public</span>
              </div>
            </div>
            <h2 class="text-3xl font-bold mb-3">Play Online</h2>
            <p class="text-white/60 leading-relaxed text-sm max-w-[280px]">
              Connect with friends or join open lobbies. Experience low-latency multiplayer via Netplay synchronization.
            </p>
          </div>

          <div class="mt-auto space-y-3 relative z-10">
            <button onclick="window.location.href='MultiplayerLobby.html' + window.location.search" class="w-full py-4 bg-primary hover:bg-primary/90 rounded-lg font-bold text-sm tracking-widest uppercase flex items-center justify-center space-x-2 transition-all shadow-lg shadow-primary/20">
              <span class="material-icons text-lg">bolt</span>
              <span>Online</span>
            </button>
          </div>

        </div>

      </div>
    </main>

    <!-- ─── Footer ─── -->
    <footer class="mt-auto flex justify-between items-end">
      <div class="flex items-center space-x-8">
      </div>
    </footer>

  </div>
  <!-- =================== END UI LAYER =================== -->


  <!-- Screen vignette overlay for depth -->
  <div class="fixed inset-0 pointer-events-none border-[30px] border-background-dark/20"></div>

  <style>
    .card-gamepad-selected {
      border-color: #0d33f2 !important;
      box-shadow: 0 0 0 3px rgba(13,51,242,0.4), 0 0 30px rgba(13,51,242,0.25);
      transform: translateY(-4px);
    }
    .hint-badge {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(16,19,34,0.9); border: 1px solid rgba(13,51,242,0.3);
      color: #94a3b8; font-size: 11px; padding: 6px 16px; border-radius: 999px;
      display: flex; gap: 12px; align-items: center; z-index: 50;
    }
    .hint-badge span { color: #fff; font-weight: 700; }
  </style>

  <!-- ══════════ CONFIRM DIALOG ══════════ -->
  <div id="confirm-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/60">
    <div class="bg-slate-900 border border-primary/20 rounded-2xl p-6 w-72 shadow-2xl">
      <p id="confirm-msg" class="text-white text-sm font-medium mb-5 text-center"></p>
      <div class="flex gap-2">
        <button id="confirm-yes" class="flex-1 py-2 bg-primary text-white rounded-lg text-sm font-bold hover:bg-primary/90 transition-colors">Sí</button>
        <button id="confirm-no" class="flex-1 py-2 bg-slate-700 text-slate-300 rounded-lg text-sm hover:bg-slate-600 transition-colors">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- ══════════ TOAST ══════════ -->
  <div id="toast" class="hidden fixed bottom-6 right-6 z-50 px-5 py-3 rounded-xl shadow-2xl text-sm font-medium max-w-xs bg-red-600 text-white"></div>

  <script>
    const { jugar } = require('../gameOnly');
    const { ipcRenderer } = require('electron');
    const { initGamepad } = require('./gamepadSupport');

    function showConfirmDialog(msg, onYes) {
      document.getElementById('confirm-msg').textContent = msg;
      document.getElementById('confirm-modal').classList.remove('hidden');
      document.getElementById('confirm-yes').onclick = () => {
        document.getElementById('confirm-modal').classList.add('hidden');
        onYes();
      };
      document.getElementById('confirm-no').onclick = () => {
        document.getElementById('confirm-modal').classList.add('hidden');
      };
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const gameParam = urlParams.get('game');
    const gameTitle = urlParams.get('title');

    if (gameTitle) {
      document.querySelector('h1').textContent = gameTitle.toUpperCase();
    }

    if (!gameParam) { window.location.href = 'mainLobby.html'; }
    const lastSlash = gameParam.lastIndexOf('/');
    const carpeta = gameParam.substring(0, lastSlash);
    const archivo = gameParam.substring(lastSlash + 1);

    // ── Gamepad navigation ──────────────────────────────────────
    const cards = document.querySelectorAll('.card-hover');
    let selectedCard = 0; // 0 = Solo, 1 = Online

    function applyCardSelection() {
      cards.forEach((c, i) => c.classList.toggle('card-gamepad-selected', i === selectedCard));
    }
    applyCardSelection();

    // Mostrar hints de mando
    const hint = document.createElement('div');
    hint.className = 'hint-badge';
    hint.innerHTML = '<span>A</span> Confirmar &nbsp;<span>B</span> Volver &nbsp;<span>←→</span> Cambiar';
    document.body.appendChild(hint);

    initGamepad({
      left:  () => { selectedCard = 0; applyCardSelection(); },
      right: () => { selectedCard = 1; applyCardSelection(); },
      up:    () => { selectedCard = 0; applyCardSelection(); },
      down:  () => { selectedCard = 1; applyCardSelection(); },
      confirm: () => {
        if (selectedCard === 0) {
          const result = jugar(carpeta, archivo);
          if (result && !result.success && result.error === 'already_running') {
            showToast('Ya hay un juego en ejecución. Ciérralo primero (Select+Start).');
          }
        } else {
          window.location.href = 'MultiplayerLobby.html' + window.location.search;
        }
      },
      back: () => {
        window.location.href = 'mainLobby.html';
      }
    });
  </script>

</body>
</html>
