# ─── Config override: ONLINE / Netplay ──────────────────────────────────────
# Este archivo se carga con --appendconfig cuando se juega online.
# Fija los ajustes óptimos para el servidor MITM en Lima (38.250.116.33)
# y corrige los valores del retroarch.cfg que quedaron subóptimos.

# Audio — latencia baja, exclusive mode para menor jitter
audio_latency = "32"
audio_max_timing_skew = "0.005000"
audio_rate_control = "true"
audio_sync = "true"
audio_wasapi_exclusive_mode = "true"

# Video — hard sync + frame delay automático para reducir input lag online
video_hard_sync = "true"
video_hard_sync_frames = "0"
video_frame_delay = "2"
video_frame_delay_auto = "true"
video_vsync = "true"

# Netplay — valores ajustados para el servidor Lima
# nat_traversal = false  →  MITM ya hace el relay, tener ambos en true causa conflicto
# check_frames = 60  →  sync cada frame, máxima precisión
# input_latency_frames_min = 0  →  sin latencia artificial de input
netplay_nat_traversal = "false"
netplay_check_frames = "60"
netplay_input_latency_frames_min = "0"
netplay_input_latency_frames_range = "2"
