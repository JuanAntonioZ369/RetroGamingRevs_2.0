# ─── Config override: OFFLINE / Solo ────────────────────────────────────────
# Este archivo se carga con --appendconfig cuando se juega solo.
# Sobreescribe los ajustes del retroarch.cfg principal que están
# pensados para netplay (baja latencia) y los cambia a valores
# más cómodos para jugar en solitario (mejor calidad de audio,
# sin delay artificial de frames).

# Audio — buffer más grande, sonido más suave sin preocupación de lag
audio_latency = "64"
audio_max_timing_skew = "0.050000"
audio_rate_control = "true"
audio_sync = "true"
audio_wasapi_exclusive_mode = "false"

# Video — sin hard sync forzado, sin frame delay artificial
video_hard_sync = "false"
video_hard_sync_frames = "0"
video_frame_delay = "0"
video_frame_delay_auto = "false"
video_vsync = "true"
